<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Physics Engine - Working Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', monospace;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        .ui-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 100;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.2);
        }

        button {
            background: #4a6fa5;
            border: none;
            color: white;
            font-size: 14px;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #6b8cbb;
            transform: scale(1.02);
        }

        .reset-btn {
            background: #a54a4a;
        }

        .stats {
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: #0f0;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        .gravity-control {
            background: rgba(0,0,0,0.7);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: white;
        }

        .gravity-control input {
            width: 150px;
            cursor: pointer;
        }

        .preset-buttons {
            display: inline-flex;
            gap: 8px;
        }

        .preset-btn {
            background: #3a3a5a;
            padding: 5px 12px;
            font-size: 12px;
        }

        .info {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #0f0;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
        }

        @media (max-width: 900px) {
            button { padding: 5px 12px; font-size: 11px; }
            .stats { font-size: 10px; }
            .gravity-control { font-size: 11px; }
            .gravity-control input { width: 100px; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="ui-panel">
        <button id="addCube">➕ Add Cube</button>
        <button id="addSphere">⚪ Add Sphere</button>
        <button id="resetBtn" class="reset-btn">🔄 Reset Scene</button>
        <div class="gravity-control">
            🌍 Gravity: <input type="range" id="gravitySlider" min="0" max="20" step="0.5" value="9.8">
            <span id="gravityVal">9.8</span>
        </div>
        <div class="preset-buttons">
            <button id="earthPreset" class="preset-btn">🌍 Earth</button>
            <button id="moonPreset" class="preset-btn">🌙 Moon</button>
            <button id="marsPreset" class="preset-btn">🔴 Mars</button>
            <button id="jupiterPreset" class="preset-btn">🪐 Jupiter</button>
            <button id="zeroPreset" class="preset-btn">✨ Zero-G</button>
        </div>
        <div class="stats">
            📦 <span id="bodyCount">0</span> &nbsp;| 🎬 <span id="fps">60</span> fps
        </div>
    </div>
    <div class="info">
        🧪 3D Physics | Objects falling with gravity | Drag to rotate camera
    </div>

    <script>
        // ============================================================
        // VECTOR3 CLASS
        // ============================================================
        class Vec3 {
            constructor(x = 0, y = 0, z = 0) { this.x = x; this.y = y; this.z = z; }
            clone() { return new Vec3(this.x, this.y, this.z); }
            add(v) { this.x += v.x; this.y += v.y; this.z += v.z; return this; }
            sub(v) { this.x -= v.x; this.y -= v.y; this.z -= v.z; return this; }
            mul(s) { this.x *= s; this.y *= s; this.z *= s; return this; }
            length() { return Math.sqrt(this.x*this.x + this.y*this.y + this.z*this.z); }
            normalize() { let l = this.length(); if(l > 0) this.mul(1/l); return this; }
            dot(v) { return this.x*v.x + this.y*v.y + this.z*v.z; }
            cross(v) { return new Vec3(this.y*v.z - this.z*v.y, this.z*v.x - this.x*v.z, this.x*v.y - this.y*v.x); }
            static sub(a,b) { return new Vec3(a.x-b.x, a.y-b.y, a.z-b.z); }
        }

        // ============================================================
        // MATRIX4 CLASS
        // ============================================================
        class Mat4 {
            constructor() { this.m = new Float32Array(16); this.identity(); }
            identity() {
                let m = this.m;
                m[0]=1; m[1]=0; m[2]=0; m[3]=0;
                m[4]=0; m[5]=1; m[6]=0; m[7]=0;
                m[8]=0; m[9]=0; m[10]=1; m[11]=0;
                m[12]=0; m[13]=0; m[14]=0; m[15]=1;
                return this;
            }
            perspective(fov, aspect, near, far) {
                let f = 1.0 / Math.tan(fov/2);
                let m = this.m;
                m[0] = f / aspect; m[1] = 0; m[2] = 0; m[3] = 0;
                m[4] = 0; m[5] = f; m[6] = 0; m[7] = 0;
                m[8] = 0; m[9] = 0; m[10] = (far+near)/(near-far); m[11] = -1;
                m[12] = 0; m[13] = 0; m[14] = (2*far*near)/(near-far); m[15] = 0;
                return this;
            }
            lookAt(eye, target, up) {
                let z = Vec3.sub(eye, target).normalize();
                let x = up.cross(z).normalize();
                let y = z.cross(x);
                let m = this.m;
                m[0]=x.x; m[1]=y.x; m[2]=z.x; m[3]=0;
                m[4]=x.y; m[5]=y.y; m[6]=z.y; m[7]=0;
                m[8]=x.z; m[9]=y.z; m[10]=z.z; m[11]=0;
                m[12]= -x.dot(eye); m[13]= -y.dot(eye); m[14]= -z.dot(eye); m[15]=1;
                return this;
            }
            translate(x, y, z) {
                let m = this.m;
                m[12] = x; m[13] = y; m[14] = z;
                return this;
            }
            scale(x, y, z) {
                let m = this.m;
                m[0] *= x; m[5] *= y; m[10] *= z;
                return this;
            }
        }

        // ============================================================
        // AABB COLLISION
        // ============================================================
        class AABB {
            constructor(pos, size) {
                this.pos = pos.clone();
                this.size = size.clone();
            }
            min() { return new Vec3(this.pos.x - this.size.x, this.pos.y - this.size.y, this.pos.z - this.size.z); }
            max() { return new Vec3(this.pos.x + this.size.x, this.pos.y + this.size.y, this.pos.z + this.size.z); }
            intersects(other) {
                let a1 = this.min(), a2 = this.max();
                let b1 = other.min(), b2 = other.max();
                return (a1.x <= b2.x && a2.x >= b1.x &&
                        a1.y <= b2.y && a2.y >= b1.y &&
                        a1.z <= b2.z && a2.z >= b1.z);
            }
            getPenetration(other) {
                let a1 = this.min(), a2 = this.max();
                let b1 = other.min(), b2 = other.max();
                let dx = Math.min(a2.x - b1.x, b2.x - a1.x);
                let dy = Math.min(a2.y - b1.y, b2.y - a1.y);
                let dz = Math.min(a2.z - b1.z, b2.z - a1.z);
                if (dx < 0 || dy < 0 || dz < 0) return null;
                let normal = new Vec3(0,0,0);
                let depth = dx;
                if (dy < depth) { depth = dy; normal = new Vec3(0,1,0); }
                if (dz < depth) { depth = dz; normal = new Vec3(0,0,1); }
                let dir = Vec3.sub(other.pos, this.pos);
                if (normal.dot(dir) < 0) normal.mul(-1);
                return { normal, depth };
            }
        }

        // ============================================================
        // RIGID BODY
        // ============================================================
        class RigidBody {
            constructor(mass, pos, size, type) {
                this.mass = mass;
                this.invMass = mass > 0 ? 1/mass : 0;
                this.pos = pos.clone();
                this.vel = new Vec3(0,0,0);
                this.size = size.clone();
                this.type = type;
                this.restitution = 0.6;
                this.friction = 0.3;
                this.aabb = new AABB(pos, size);
                this.color = type === 'cube' ? [0.3, 0.6, 0.9, 1] : [0.9, 0.5, 0.2, 1];
            }
            updateAABB() {
                this.aabb.pos = this.pos;
                this.aabb.size = this.size;
            }
            integrate(dt, gravity) {
                if (this.invMass === 0) return;
                this.vel.y -= gravity * dt;
                this.pos.x += this.vel.x * dt;
                this.pos.y += this.vel.y * dt;
                this.pos.z += this.vel.z * dt;
                this.updateAABB();
            }
        }

        // ============================================================
        // PHYSICS WORLD
        // ============================================================
        class PhysicsWorld {
            constructor(gravity = 9.8) {
                this.bodies = [];
                this.gravity = gravity;
                this.groundY = -3.5;
            }
            addBody(b) { this.bodies.push(b); }
            clear() { this.bodies = []; }
            setGravity(g) { this.gravity = g; }
            step(dt) {
                // Integration
                for (let b of this.bodies) b.integrate(dt, this.gravity);
                
                // Collisions
                for (let iter = 0; iter < 3; iter++) {
                    for (let i = 0; i < this.bodies.length; i++) {
                        for (let j = i+1; j < this.bodies.length; j++) {
                            let a = this.bodies[i];
                            let b = this.bodies[j];
                            if (a.invMass === 0 && b.invMass === 0) continue;
                            if (!a.aabb.intersects(b.aabb)) continue;
                            let collision = a.aabb.getPenetration(b.aabb);
                            if (collision) {
                                // Position correction
                                let correction = collision.normal.clone();
                                correction.mul(collision.depth * 0.5);
                                if (a.invMass > 0) a.pos.sub(correction);
                                if (b.invMass > 0) b.pos.add(correction);
                                a.updateAABB(); b.updateAABB();
                                
                                // Velocity resolution
                                let relVel = Vec3.sub(b.vel, a.vel);
                                let velAlong = relVel.dot(collision.normal);
                                if (velAlong < 0) {
                                    let e = Math.min(a.restitution, b.restitution);
                                    let j = -(1 + e) * velAlong;
                                    j /= (a.invMass + b.invMass);
                                    let impulse = collision.normal.clone();
                                    impulse.mul(j);
                                    if (a.invMass > 0) a.vel.sub(impulse.mul(a.invMass));
                                    if (b.invMass > 0) b.vel.add(impulse.mul(b.invMass));
                                }
                            }
                        }
                    }
                }
                
                // Ground collision
                for (let b of this.bodies) {
                    if (b.pos.y - b.size.y < this.groundY) {
                        b.pos.y = this.groundY + b.size.y;
                        if (b.vel.y < 0) b.vel.y *= -b.restitution;
                        b.vel.x *= (1 - b.friction * 0.5);
                        b.vel.z *= (1 - b.friction * 0.5);
                        b.updateAABB();
                    }
                    // Boundaries
                    let bound = 5.5;
                    if (Math.abs(b.pos.x) > bound - b.size.x) {
                        b.pos.x = Math.sign(b.pos.x) * (bound - b.size.x);
                        b.vel.x *= -0.5;
                    }
                    if (Math.abs(b.pos.z) > bound - b.size.z) {
                        b.pos.z = Math.sign(b.pos.z) * (bound - b.size.z);
                        b.vel.z *= -0.5;
                    }
                }
            }
        }

        // ============================================================
        // WEBGL RENDERER
        // ============================================================
        const vsSource = `
            attribute vec3 aPos;
            attribute vec3 aNorm;
            uniform mat4 uModel;
            uniform mat4 uView;
            uniform mat4 uProj;
            varying vec3 vNorm;
            void main() {
                vNorm = mat3(uModel) * aNorm;
                gl_Position = uProj * uView * uModel * vec4(aPos, 1.0);
            }
        `;

        const fsSource = `
            precision mediump float;
            varying vec3 vNorm;
            uniform vec3 uLightDir;
            uniform vec3 uLightColor;
            uniform vec3 uAmbient;
            uniform vec4 uColor;
            void main() {
                vec3 norm = normalize(vNorm);
                vec3 lightDir = normalize(uLightDir);
                float diff = max(dot(norm, lightDir), 0.2);
                vec3 diffuse = diff * uLightColor;
                vec3 result = (uAmbient + diffuse) * uColor.rgb;
                gl_FragColor = vec4(result, uColor.a);
            }
        `;

        function createShader(gl, type, src) {
            let shader = gl.createShader(type);
            gl.shaderSource(shader, src);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
            }
            return shader;
        }

        function createProgram(gl, vs, fs) {
            let program = gl.createProgram();
            gl.attachShader(program, vs);
            gl.attachShader(program, fs);
            gl.linkProgram(program);
            return program;
        }

        function createCubeMesh(gl) {
            let verts = [
                -0.5,-0.5, 0.5, 0,0,1,  0.5,-0.5, 0.5, 0,0,1,  0.5, 0.5, 0.5, 0,0,1, -0.5, 0.5, 0.5, 0,0,1,
                -0.5,-0.5,-0.5, 0,0,-1, -0.5, 0.5,-0.5, 0,0,-1,  0.5, 0.5,-0.5, 0,0,-1,  0.5,-0.5,-0.5, 0,0,-1,
                -0.5, 0.5,-0.5, 0,1,0, -0.5, 0.5, 0.5, 0,1,0,  0.5, 0.5, 0.5, 0,1,0,  0.5, 0.5,-0.5, 0,1,0,
                -0.5,-0.5,-0.5, 0,-1,0,  0.5,-0.5,-0.5, 0,-1,0,  0.5,-0.5, 0.5, 0,-1,0, -0.5,-0.5, 0.5, 0,-1,0,
                 0.5,-0.5,-0.5, 1,0,0,  0.5, 0.5,-0.5, 1,0,0,  0.5, 0.5, 0.5, 1,0,0,  0.5,-0.5, 0.5, 1,0,0,
                -0.5,-0.5,-0.5,-1,0,0, -0.5,-0.5, 0.5,-1,0,0, -0.5, 0.5, 0.5,-1,0,0, -0.5, 0.5,-0.5,-1,0,0
            ];
            let indices = [];
            for (let i = 0; i < 6; i++) {
                let base = i * 4;
                indices.push(base, base+1, base+2, base, base+2, base+3);
            }
            let vbo = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(verts), gl.STATIC_DRAW);
            let ibo = gl.createBuffer();
            gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
            gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(indices), gl.STATIC_DRAW);
            return { vbo, ibo, count: indices.length, stride: 6*4, posOff: 0, normOff: 3*4 };
        }

        function createSphereMesh(gl, rad=0.5, seg=16) {
            let verts = [], indices = [];
            for (let i = 0; i <= seg; i++) {
                let phi = Math.PI * i / seg;
                let y = rad * Math.cos(phi);
                let r = rad * Math.sin(phi);
                for (let j = 0; j <= seg; j++) {
                    let theta = 2 * Math.PI * j / seg;
                    let x = r * Math.cos(theta);
                    let z = r * Math.sin(theta);
                    verts.push(x, y, z, x/rad, y/rad, z/rad);
                }
            }
            for (let i = 0; i < seg; i++) {
                for (let j = 0; j < seg; j++) {
                    let first = i * (seg+1) + j;
                    let second = first + seg + 1;
                    indices.push(first, second, first+1);
                    indices.push(second, second+1, first+1);
                }
            }
            let vbo = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(verts), gl.STATIC_DRAW);
            let ibo = gl.createBuffer();
            gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
            gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(indices), gl.STATIC_DRAW);
            return { vbo, ibo, count: indices.length, stride: 6*4, posOff: 0, normOff: 3*4 };
        }

        // ============================================================
        // INITIALIZATION
        // ============================================================
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl');
        
        if (!gl) {
            alert("WebGL not supported!");
            throw new Error("WebGL not supported");
        }
        
        let vs = createShader(gl, gl.VERTEX_SHADER, vsSource);
        let fs = createShader(gl, gl.FRAGMENT_SHADER, fsSource);
        let program = createProgram(gl, vs, fs);
        gl.useProgram(program);
        
        let uModel = gl.getUniformLocation(program, 'uModel');
        let uView = gl.getUniformLocation(program, 'uView');
        let uProj = gl.getUniformLocation(program, 'uProj');
        let uLightDir = gl.getUniformLocation(program, 'uLightDir');
        let uLightColor = gl.getUniformLocation(program, 'uLightColor');
        let uAmbient = gl.getUniformLocation(program, 'uAmbient');
        let uColor = gl.getUniformLocation(program, 'uColor');
        
        let cubeMesh = createCubeMesh(gl);
        let sphereMesh = createSphereMesh(gl);
        
        gl.enable(gl.DEPTH_TEST);
        gl.enable(gl.CULL_FACE);
        gl.clearColor(0.1, 0.15, 0.25, 1);
        
        let world = new PhysicsWorld(9.8);
        
        function resetScene() {
            world.clear();
            // Ground
            let ground = new RigidBody(0, new Vec3(0, -3.5, 0), new Vec3(6, 0.2, 6), 'cube');
            ground.color = [0.2, 0.7, 0.2, 1];
            world.addBody(ground);
            
            // Create falling objects at various heights
            let objects = [
                { x: -1.5, y: 2.5, z: -1, type: 'cube' },
                { x: 1.2, y: 3.0, z: 1.2, type: 'sphere' },
                { x: -0.5, y: 4.0, z: 1.5, type: 'cube' },
                { x: 1.8, y: 2.0, z: -1.2, type: 'sphere' },
                { x: -1.2, y: 3.5, z: 1, type: 'cube' },
                { x: 0.5, y: 4.5, z: -1.5, type: 'sphere' },
                { x: -1.8, y: 2.8, z: -0.5, type: 'cube' },
                { x: 1, y: 3.2, z: -1.8, type: 'sphere' },
                { x: 0, y: 5, z: 0.5, type: 'cube' },
                { x: -0.8, y: 2.2, z: 1.8, type: 'sphere' }
            ];
            
            for (let obj of objects) {
                let pos = new Vec3(obj.x, obj.y, obj.z);
                let rb = new RigidBody(1, pos, new Vec3(0.5, 0.5, 0.5), obj.type);
                rb.vel = new Vec3((Math.random() - 0.5) * 1, 0, (Math.random() - 0.5) * 1);
                world.addBody(rb);
            }
        }
        
        function addCube() {
            let pos = new Vec3((Math.random() - 0.5) * 4, 4 + Math.random() * 2, (Math.random() - 0.5) * 4);
            let rb = new RigidBody(1, pos, new Vec3(0.5, 0.5, 0.5), 'cube');
            rb.vel = new Vec3((Math.random() - 0.5) * 1.5, 0, (Math.random() - 0.5) * 1.5);
            world.addBody(rb);
        }
        
        function addSphere() {
            let pos = new Vec3((Math.random() - 0.5) * 4, 4 + Math.random() * 2, (Math.random() - 0.5) * 4);
            let rb = new RigidBody(1, pos, new Vec3(0.5, 0.5, 0.5), 'sphere');
            rb.vel = new Vec3((Math.random() - 0.5) * 1.5, 0, (Math.random() - 0.5) * 1.5);
            world.addBody(rb);
        }
        
        // UI Events
        document.getElementById('addCube').onclick = addCube;
        document.getElementById('addSphere').onclick = addSphere;
        document.getElementById('resetBtn').onclick = resetScene;
        
        let gravitySlider = document.getElementById('gravitySlider');
        let gravityVal = document.getElementById('gravityVal');
        gravitySlider.oninput = () => {
            let val = parseFloat(gravitySlider.value);
            gravityVal.innerText = val;
            world.setGravity(val);
        };
        
        document.getElementById('earthPreset').onclick = () => { gravitySlider.value = '9.8'; gravitySlider.oninput(); };
        document.getElementById('moonPreset').onclick = () => { gravitySlider.value = '1.6'; gravitySlider.oninput(); };
        document.getElementById('marsPreset').onclick = () => { gravitySlider.value = '3.7'; gravitySlider.oninput(); };
        document.getElementById('jupiterPreset').onclick = () => { gravitySlider.value = '20'; gravitySlider.oninput(); };
        document.getElementById('zeroPreset').onclick = () => { gravitySlider.value = '0'; gravitySlider.oninput(); };
        
        resetScene();
        
        // Camera controls - better angle to see objects
        let camAngleX = 0.3;
        let camAngleY = 0.5;
        let camDist = 10;
        let mouseX = 0, mouseY = 0, dragging = false;
        
        canvas.onmousedown = (e) => { dragging = true; mouseX = e.clientX; mouseY = e.clientY; canvas.style.cursor = 'grabbing'; };
        window.onmouseup = () => { dragging = false; canvas.style.cursor = 'grab'; };
        canvas.onmousemove = (e) => {
            if (dragging) {
                let dx = e.clientX - mouseX;
                let dy = e.clientY - mouseY;
                camAngleY += dx * 0.008;
                camAngleX += dy * 0.008;
                camAngleX = Math.max(-1, Math.min(1, camAngleX));
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        };
        canvas.onwheel = (e) => {
            camDist -= e.deltaY * 0.01;
            camDist = Math.max(6, Math.min(15, camDist));
            e.preventDefault();
        };
        canvas.style.cursor = 'grab';
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        window.onresize = resize;
        resize();
        
        let lastTime = performance.now();
        let frame = 0;
        let fps = 60;
        
        function render() {
            let now = performance.now();
            let dt = Math.min(0.033, (now - lastTime) / 1000);
            world.step(dt);
            lastTime = now;
            
            frame++;
            if (frame % 30 === 0) {
                fps = Math.round(1 / dt);
                document.getElementById('fps').innerText = fps;
                document.getElementById('bodyCount').innerText = world.bodies.length;
            }
            
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
            
            let aspect = canvas.width / canvas.height;
            let proj = new Mat4().perspective(Math.PI / 3, aspect, 0.1, 50);
            
            let camX = Math.sin(camAngleY) * Math.cos(camAngleX) * camDist;
            let camY = Math.sin(camAngleX) * camDist + 1;
            let camZ = Math.cos(camAngleY) * Math.cos(camAngleX) * camDist;
            let view = new Mat4().lookAt(new Vec3(camX, camY, camZ), new Vec3(0, 1, 0), new Vec3(0, 1, 0));
            
            gl.uniformMatrix4fv(uProj, false, proj.m);
            gl.uniformMatrix4fv(uView, false, view.m);
            gl.uniform3f(uLightDir, -0.5, -1, -0.5);
            gl.uniform3f(uLightColor, 1, 0.95, 0.85);
            gl.uniform3f(uAmbient, 0.3, 0.3, 0.35);
            
            let posLoc = gl.getAttribLocation(program, 'aPos');
            let normLoc = gl.getAttribLocation(program, 'aNorm');
            gl.enableVertexAttribArray(posLoc);
            gl.enableVertexAttribArray(normLoc);
            
            for (let body of world.bodies) {
                let model = new Mat4().identity();
                model.translate(body.pos.x, body.pos.y, body.pos.z);
                model.scale(body.size.x, body.size.y, body.size.z);
                gl.uniformMatrix4fv(uModel, false, model.m);
                gl.uniform4fv(uColor, body.color);
                
                let mesh = body.type === 'cube' ? cubeMesh : sphereMesh;
                gl.bindBuffer(gl.ARRAY_BUFFER, mesh.vbo);
                gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, mesh.ibo);
                gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, mesh.stride, mesh.posOff);
                gl.vertexAttribPointer(normLoc, 3, gl.FLOAT, false, mesh.stride, mesh.normOff);
                gl.drawElements(gl.TRIANGLES, mesh.count, gl.UNSIGNED_SHORT, 0);
            }
            
            requestAnimationFrame(render);
        }
        
        render();
    </script>
</body>
</html>
